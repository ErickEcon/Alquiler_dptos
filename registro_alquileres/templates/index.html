<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alquileres</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            /* Add some visual appeal with a subtle background gradient */
            background-image: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glassmorphism w-full max-w-lg rounded-2xl p-8">
        <div class="text-center mb-8">
            <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-sm">
                🏢
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Cargar Nuevo Contrato</h1>
            <p class="text-gray-500 text-sm mt-1">Registra los datos de alquileres, minidepartamentos y habitaciones</p>
        </div>

        {% if success %}
        <div class="bg-green-50 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded-r-lg" role="alert">
            <div class="flex">
                <div class="py-1"><svg class="fill-current h-6 w-6 text-green-500 mr-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M2.93 17.07A10 10 0 1 1 17.07 2.93 10 10 0 0 1 2.93 17.07zm12.73-1.41A8 8 0 1 0 4.34 4.34a8 8 0 0 0 11.32 11.32zM6.7 9.29L9 11.6l4.3-4.3 1.4 1.42L9 14.4l-3.7-3.7 1.4-1.42z"/></svg></div>
                <div>
                    <p class="font-bold text-sm">¡Guardado con Éxito!</p>
                    <p class="text-sm">El registro ha sido actualizado en la nube.</p>
                </div>
            </div>
        </div>
        {% endif %}

        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r-lg" role="alert">
            <div class="flex">
                <div class="py-1"><svg class="fill-current h-6 w-6 text-red-500 mr-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/></svg></div>
                <div>
                    <p class="font-bold text-sm">Error al guardar</p>
                    <p class="text-sm">{{ error }}</p>
                </div>
            </div>
        </div>
        {% endif %}

        <form action="/guardar" method="POST" class="space-y-5">
            <div>
                <label for="habitacion" class="block text-sm font-semibold text-gray-700 mb-1">Inmueble / Habitación</label>
                <select id="habitacion" name="habitacion" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white outline-none transition-all text-gray-800">
                    <option value="" disabled selected>Selecciona el departamento o habitación</option>
                    {% for room in rooms %}
                        <option value="{{ room }}">{{ room }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="inquilino" class="block text-sm font-semibold text-gray-700 mb-1">Nombre del Inquilino</label>
                <input type="text" id="inquilino" name="inquilino" placeholder="Nombres y Apellidos (Opcional si renueva)" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white outline-none transition-all text-gray-800">
            </div>

            <div>
                <label for="precio" class="block text-sm font-semibold text-gray-700 mb-1">Precio Pagado</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-gray-500 font-medium">$</span>
                    </div>
                    <input type="number" step="0.01" id="precio" name="precio" required placeholder="0.00" class="w-full pl-8 px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white outline-none transition-all text-gray-800">
                </div>
            </div>

            <div>
                <label for="fecha_inicio" class="block text-sm font-semibold text-gray-700 mb-1">Fecha de Inicio de Alquiler</label>
                <input type="date" id="fecha_inicio" name="fecha_inicio" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:bg-white outline-none transition-all text-gray-800">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-transform transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 mt-6 shadow-md shadow-blue-500/30">
                💾 Guardar Registro en Excel
            </button>
        </form>
    </div>
</body>
</html>
